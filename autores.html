<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autores - Impactos da IA</title>
    <style>
      /* Estilos Básicos */
      body {
        background-color: #0f1115;
        color: #e8e8ea;
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 0;
        text-align: center;
      }

      /* Navegação */
      nav {
        background-color: #1a1d24;
        border-bottom: 1px solid #2a2e37;
        padding: 10px;
      }

      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      nav ul li {
        display: inline;
        margin: 0 10px;
      }

      nav ul li a {
        color: #9a9aa3;
        text-decoration: none;
        font-size: 14px;
      }

      nav ul li a:hover {
        color: #e8e8ea;
      }

      /* Conteúdo Principal */
      .container {
        max-width: 600px;
        margin: 60px auto;
        padding: 20px;
      }

      h1 {
        color: #22c55e;
        font-size: 32px;
        margin-bottom: 10px;
      }

      .descricao {
        color: #9a9aa3;
        margin-bottom: 40px;
      }

      /* Lista de Autores */
      .autor {
        background-color: #1a1d24;
        border: 1px solid #2a2e37;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 8px;
      }

      .autor h3 {
        color: #e8e8ea;
        margin: 0 0 5px 0;
      }

      .autor p {
        color: #9a9aa3;
        margin: 0;
        font-family: monospace;
      }

      /* Botão Voltar */
      .voltar {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        color: #22c55e;
        text-decoration: none;
        border: 1px solid #22c55e;
        border-radius: 4px;
      }

      .voltar:hover {
        background-color: #22c55e;
        color: #0f1115;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Página Inicial</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Autores</h1>
      <p class="descricao">Ciência da Computação — 8º Semestre — UNIP — 2026</p>

      <div class="autor">
        <h3>Natan Venancio Santiago</h3>
        <p>RA: N032669</p>
      </div>

      <div class="autor">
        <h3>Nick Arcana Frontanilla</h3>
        <p>RA: N9431C0</p>
      </div>

      <div class="autor">

        <p>RA: F34EDD3</p>
      </div>

      <div class="autor">
        <h3>Vitor Siqueira Pirolo</h3>
        <p>RA: G008073</p>
      </div>

      <a href="index.html" class="voltar">Voltar para o site</a>
    </div>
  </body>
</html>
